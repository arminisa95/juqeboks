<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>juqeboks Admin</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .admin-container { max-width: 900px; margin: 40px auto; padding: 20px; }
        .admin-card { background: var(--surface); border-radius: 12px; padding: 20px; margin-bottom: 24px; }
        .admin-title { font-size: 1.5rem; margin-bottom: 16px; }
        .admin-row { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
        .admin-input { background: var(--background); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 6px; }
        .admin-btn { background: var(--primary); color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        .admin-btn:hover { opacity: 0.9; }
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
        .admin-table th, .admin-table td { text-align: left; padding: 10px; border-bottom: 1px solid var(--border); }
        .admin-table th { color: var(--muted); font-weight: 500; }
        .status { margin-top: 12px; padding: 10px; border-radius: 6px; background: var(--background); }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1>juqeboks Admin</h1>

        <div class="admin-card">
            <h2 class="admin-title">Calculate Royalties</h2>
            <div class="admin-row">
                <input type="number" id="calcYear" class="admin-input" placeholder="Year">
                <input type="number" id="calcMonth" class="admin-input" placeholder="Month">
                <button class="admin-btn" id="calcBtn">Calculate</button>
            </div>
            <div id="calcStatus" class="status" style="display:none;"></div>
        </div>

        <div class="admin-card">
            <h2 class="admin-title">Monthly Report</h2>
            <div class="admin-row">
                <input type="number" id="reportYear" class="admin-input" placeholder="Year">
                <input type="number" id="reportMonth" class="admin-input" placeholder="Month">
                <button class="admin-btn" id="reportBtn">Load Report</button>
            </div>
            <table class="admin-table" id="reportTable" style="display:none;">
                <thead>
                    <tr><th>Artist</th><th>Listeners</th><th>Seconds</th><th>Payout</th></tr>
                </thead>
                <tbody></tbody>
            </table>
            <div id="reportStatus" class="status" style="display:none;"></div>
        </div>

        <div class="admin-card">
            <h2 class="admin-title">Artist Payouts</h2>
            <button class="admin-btn" id="balancesBtn">Load Balances</button>
            <table class="admin-table" id="balancesTable" style="display:none;">
                <thead>
                    <tr><th>Artist</th><th>Owner</th><th>Unpaid</th><th>Periods</th><th>Action</th></tr>
                </thead>
                <tbody></tbody>
            </table>
            <div id="balancesStatus" class="status" style="display:none;"></div>
        </div>

        <div class="admin-card">
            <h2 class="admin-title">Copyright Reports (Takedown)</h2>
            <div class="admin-row">
                <select id="reportFilter" class="admin-input">
                    <option value="pending">Pending</option>
                    <option value="all">All</option>
                    <option value="removed">Removed</option>
                    <option value="dismissed">Dismissed</option>
                </select>
                <button class="admin-btn" id="reportsBtn">Load Reports</button>
            </div>
            <table class="admin-table" id="reportsTable" style="display:none;">
                <thead>
                    <tr><th>Track</th><th>Uploader</th><th>Reporter</th><th>Rights Holder</th><th>Status</th><th>Actions</th></tr>
                </thead>
                <tbody></tbody>
            </table>
            <div id="reportsStatus" class="status" style="display:none;"></div>
        </div>
    </div>

    <script src="js/api-base.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
