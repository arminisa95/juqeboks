<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="description" content="JUKE - A modern music streaming platform. Discover, stream, and share your favorite music with playlists and social features.">
    <meta name="theme-color" content="#F72193">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="JUKE - Music Streaming Platform">
    <meta property="og:description" content="Discover, stream, and share your favorite music with playlists and social features.">
    <meta property="og:image" content="images/juqe.png">
    
    <title>JUKE - Music Streaming Platform</title>

    <link rel="icon" type="image/png" href="images/juqe.png">
    <link rel="apple-touch-icon" href="images/juqe.png">

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/musicplayer.css">
    <link rel="stylesheet" href="css/feed.css">
    <link rel="stylesheet" href="css/koleqtion.css">
    <link rel="stylesheet" href="css/lists.css">
    <link rel="stylesheet" href="css/disqo.css">
    <link rel="stylesheet" href="css/upload.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/register.css">
    <link rel="stylesheet" href="css/profile.css">
    <link rel="stylesheet" href="css/media-editor.css">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/mobile.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script src="js/api-base.js"></script>
    <script src="js/media-editor.js"></script>
    <script src="js/player.js" defer></script>
    <script src="js/auth.js" defer></script>
    <script src="js/profile.js" defer></script>
    <script src="js/api.js" defer></script>
    <script src="js/lists.js" defer></script>
    <script src="js/uploadPage.js" defer></script>
    <script src="js/queue.js" defer></script>
    <script src="js/spa.js" defer></script>
    <script src="js/showtime.js" defer></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Honk:MORF@15&family=Kedebideri:wght@400;500;600;700;800;900&family=Sigmar&display=swap" rel="stylesheet">
</head>
<body data-spa="true">
    <header>
        <a href="#/feed">
            <img src="images/juqe.png" alt="juqeboks Logo" class="logo-img">
        </a>

        <nav>
            <div class="nav-buttons">
                <a href="#/feed" class="feed">_feed</a>
                <a href="#/lists" class="artists">_lists</a>
                <a href="#/disqo" class="lists">_disqo</a>
            </div>
            <div class="search-container">
                <input type="text" class="search-bar" placeholder="Search for music, artists...">
                <button class="search-btn"><i class="fas fa-search"></i></button>
            </div>
            <div class="header-right">
                <div class="nav-buttons">
                    <a href="views/analytics-dashboard.html" class="app" target="_blank">_charts</a>
                    <a href="#/upload" class="app">_uqload</a>
                    <a href="#/koleqtion" class="register">_koleqtion</a>
                    <a href="#/login" class="login auth-login">_U</a>
                    <a href="#/profile" class="login auth-user">_U</a>
                </div>
            </div>
        </nav>
    </header>

    <template id="tpl-feed">
        <section class="music-feed">
            <div class="feed-container">
                <h1 class="feed-title">Feed</h1>
                <div class="music-grid" id="feedGrid"></div>
            </div>
        </section>
    </template>

    <template id="tpl-disqo">
        <section class="music-feed">
            <div class="disqo-container">
                <div class="disqo-featured" id="disqoFeatured"></div>
                
                <div class="disqo-section">
                    <div class="disqo-section-header">
                        <h2 class="disqo-section-title">Browse by Genre</h2>
                    </div>
                    <div class="genre-grid" id="genreGrid">
                        <div class="genre-card" data-genre="electronic">
                            <div class="genre-card-title">Electronic</div>
                        </div>
                        <div class="genre-card" data-genre="hiphop">
                            <div class="genre-card-title">Hip Hop</div>
                        </div>
                        <div class="genre-card" data-genre="rock">
                            <div class="genre-card-title">Rock</div>
                        </div>
                        <div class="genre-card" data-genre="pop">
                            <div class="genre-card-title">Pop</div>
                        </div>
                        <div class="genre-card" data-genre="jazz">
                            <div class="genre-card-title">Jazz</div>
                        </div>
                        <div class="genre-card" data-genre="rnb">
                            <div class="genre-card-title">R&B</div>
                        </div>
                    </div>
                </div>
                
                <div class="disqo-section">
                    <div class="disqo-section-header">
                        <h2 class="disqo-section-title">Made For You</h2>
                        <a href="#" class="disqo-section-link">See all</a>
                    </div>
                    <div class="recommendations-row" id="recommendationsRow"></div>
                </div>
                
                <div class="disqo-section">
                    <div class="disqo-section-header">
                        <h2 class="disqo-section-title">New Releases</h2>
                        <a href="#" class="disqo-section-link">See all</a>
                    </div>
                    <div class="album-grid" id="newReleasesGrid"></div>
                </div>
            </div>
        </section>
    </template>

    <template id="tpl-koleqtion">
        <main>
            <div class="library-container">
                <aside class="library-nav" aria-label="Library directories">
                    <div class="library-nav-title">_koleqtion</div>
                    <div class="library-nav-subtitle">Your Library</div>
                    <div class="library-nav-items" role="tablist">
                        <button class="library-nav-item active" type="button" role="tab" data-view="tracks">_tracks</button>
                        <button class="library-nav-item" type="button" role="tab" data-view="playlists">_playlists</button>
                        <button class="library-nav-item" type="button" role="tab" data-view="albums">_albums</button>
                    </div>
                    <div class="library-nav-footer">Switch with ↑/↓, open with Enter</div>
                </aside>

                <section class="library-content" aria-label="Library content">
                    <div class="library-panel active" id="libraryPanelTracks" data-panel="tracks" role="tabpanel">
                        <div class="library-panel-header">
                            <div class="library-panel-title">_tracks</div>
                            <div class="library-panel-hint">Your tracks</div>
                        </div>
                        <div class="tracks-grid" id="tracksGrid"></div>
                    </div>

                    <div class="library-panel" id="libraryPanelPlaylists" data-panel="playlists" role="tabpanel">
                        <div class="library-panel-header">
                            <div class="library-panel-title">_playlists</div>
                            <div class="library-panel-hint">Your playlists</div>
                        </div>
                        <div class="tracks-grid" id="playlistsGrid"></div>
                    </div>

                    <div class="library-panel" id="libraryPanelAlbums" data-panel="albums" role="tabpanel">
                        <div class="library-panel-header">
                            <div class="library-panel-title">_albums</div>
                            <div class="library-panel-hint">Your albums</div>
                        </div>
                        <div class="tracks-grid" id="albumsGrid"></div>
                    </div>
                </section>
            </div>
        </main>
    </template>

    <template id="tpl-lists">
        <main>
            <div class="lists-shell" id="listsShell">
                <!-- Mobile Tab Bar -->
                <div class="lists-mobile-tabs">
                    <button class="lists-tab active" data-tab="history">
                        <i class="fas fa-history"></i>
                        <span>History</span>
                    </button>
                    <button class="lists-tab" data-tab="liked">
                        <i class="fas fa-heart"></i>
                        <span>Liked</span>
                    </button>
                    <button class="lists-tab" data-tab="playlists">
                        <i class="fas fa-list"></i>
                        <span>Playlists</span>
                    </button>
                    <button class="lists-tab" data-tab="liked-playlists">
                        <i class="fas fa-folder-open"></i>
                        <span>Saved</span>
                    </button>
                </div>

                <!-- Desktop Sidebar -->
                <aside class="lists-nav" aria-label="Lists directories">
                    <div class="lists-nav-title">
                        _lists
                        <button class="lists-add-btn" type="button" id="addPlaylistBtn" aria-label="Add playlist">
                            <i class="fas fa-plus"></i>
                        </button>
                    </div>
                    <div class="lists-nav-subtitle">Directories</div>
                    <div class="lists-nav-items" role="tablist">
                        <button class="lists-nav-item active" type="button" role="tab" data-view="history">_history</button>
                        <button class="lists-nav-item" type="button" role="tab" data-view="liked">_liked tracks</button>
                        <button class="lists-nav-item" type="button" role="tab" data-view="liked-playlists">_liked playlists</button>
                    </div>
                    <div class="lists-nav-footer">Switch with ↑/↓, open with Enter</div>
                </aside>

                <section class="lists-content" aria-label="Lists content">
                    <!-- History Panel -->
                    <div class="lists-panel active" id="listsPanelHistory" data-panel="history" role="tabpanel">
                        <div class="lists-panel-header">
                            <div class="lists-panel-title">_history</div>
                            <div class="lists-panel-hint">Recently played tracks</div>
                            <button class="lists-clear-btn" id="clearHistoryBtn" type="button">
                                <i class="fas fa-trash-alt"></i> Clear
                            </button>
                        </div>
                        <div id="historyTracks" class="history-list"></div>
                    </div>

                    <div class="lists-panel" id="listsPanelLiked" data-panel="liked" role="tabpanel">
                        <div class="lists-panel-header">
                            <div class="lists-panel-title">_liked tracks</div>
                            <div class="lists-panel-hint">Your liked tracks</div>
                        </div>
                        <div id="likedTracks" class="cards-grid"></div>
                    </div>

                    <div class="lists-panel" id="listsPanelLikedPlaylists" data-panel="liked-playlists" role="tabpanel">
                        <div class="lists-panel-header">
                            <div class="lists-panel-title">_liked playlists</div>
                            <div class="lists-panel-hint">Your liked playlists</div>
                        </div>
                        <div id="likedPlaylists" class="cards-grid"></div>
                    </div>

                    <div class="lists-panel" id="listsPanelLists" data-panel="playlists" role="tabpanel">
                        <div class="lists-panel-header">
                            <div class="lists-panel-title">_lists</div>
                            <div class="lists-panel-hint">Your playlists</div>
                        </div>
                        <div id="myPlaylists" class="cards-grid"></div>
                    </div>

                    <div class="lists-panel" id="listsPanelPlaylist" data-panel="playlist" role="tabpanel">
                        <div class="lists-panel-header">
                            <button class="lists-back" type="button" id="playlistBack">Back</button>
                            <div class="lists-panel-title" id="playlistTitle">Playlist</div>
                            <div class="lists-panel-hint" id="playlistStatus"></div>
                        </div>
                        <div id="playlistTracks" class="lists-tracklist"></div>
                    </div>
                </section>
            </div>
        </main>
    </template>

    <template id="tpl-upload">
        <main>
            <div class="upload-container">
                <div class="upload-header">
                    <h1>Upload Your Music</h1>
                    <p>Share your sound with the world</p>
                </div>

                <form id="uploadForm">
                    <div class="upload-area" id="dropZone">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p>Drag & drop your audio files here or</p>
                        <p><span class="browse-link">browse</span> your files</p>
                        <input type="file" id="fileInput" accept="audio/*" class="file-input-hidden" multiple>
                        <div class="file-info" id="fileInfo">No files selected</div>
                    </div>

                    <div class="form-group">
                        <label for="coverInput">Cover Image (optional)</label>
                        <input type="file" id="coverInput" class="form-control" accept="image/*">
                        <div class="file-info" id="coverInfo">No cover selected</div>
                    </div>

                    <div class="form-group">
                        <label for="videoInput"><i class="fas fa-video"></i> Music Video (optional)</label>
                        <input type="file" id="videoInput" class="form-control" accept="video/*">
                        <div class="file-info" id="videoInfo">No video selected</div>
                        <small class="text-muted">Add a music video to play alongside your track</small>
                    </div>

                    <div class="form-group">
                        <label for="trackTitle">Track Title *</label>
                        <input type="text" id="trackTitle" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label for="artistName">Artist Name *</label>
                        <input type="text" id="artistName" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label for="albumTitle">Album (leave empty for Single)</label>
                        <input type="text" id="albumTitle" class="form-control" placeholder="Single">
                    </div>

                    <div class="form-group">
                        <label for="genre">Genre *</label>
                        <select id="genre" class="form-control" required>
                            <option value="">Select a genre</option>
                            <option value="electronic">Electronic</option>
                            <option value="hiphop">Hip Hop</option>
                            <option value="rock">Rock</option>
                            <option value="pop">Pop</option>
                            <option value="jazz">Jazz</option>
                            <option value="classical">Classical</option>
                            <option value="rnb">R&B</option>
                            <option value="other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea id="description" class="form-control" rows="3"></textarea>
                    </div>

                    <div class="form-group checkbox-group">
                        <label>
                            <input type="checkbox" id="termsConfirmed" required>
                            I have read and agree to the <a href="/agb.html" target="_blank" class="link-turquoise">Terms of Service (AGB)</a> and the <a href="/privacy.html" target="_blank" class="link-turquoise">Privacy Policy</a>.
                        </label>
                    </div>

                    <div class="form-group checkbox-group">
                        <label>
                            <input type="checkbox" id="rightsConfirmed" required>
                            I confirm that I own all necessary rights to this music (composition, lyrics, recording, cover art) and that neither I nor any co-creator is registered with AKM, GEMA, AustroMechana, or any other collecting society for this work. I am solely responsible for any copyright claims.
                        </label>
                    </div>

                    <button type="submit" class="btn-upload">Upload Track</button>
                </form>
            </div>
        </main>
    </template>

    <template id="tpl-login">
        <main class="auth-main">
            <div class="login-container">
                <div class="login-header">
                    <h1 class="login-title">Welcome to juqeboks</h1>
                    <button class="login-close-btn" onclick="window.location.hash='#/feed'" aria-label="Close login">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <form id="loginForm">
                    <div class="form-group">
                        <label for="username">Username or Email</label>
                        <input type="text" id="username" name="username" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <button type="submit" class="login-btn">Log In</button>
                </form>
                <div class="signup-link">
                    Don't have an account? <a href="#/welcome">Sign up</a>
                </div>
            </div>
        </main>
    </template>

    <template id="tpl-welcome">
        <main class="auth-main">
            <div class="register-container">
                <div class="register-header">
                    <h1 class="register-title">Join juqeboks</h1>
                    <button class="register-close-btn" onclick="window.location.hash='#/feed'" aria-label="Close welcome">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <p class="welcome-subtitle">Choose your subscription to get started</p>
                <div class="account-type-grid two-column">
                    <div class="account-type-card" data-type="user">
                        <div class="account-type-icon">_user</div>
                        <h3>Individual</h3>
                        <p class="account-type-price">5€ <span>/ month</span></p>
                        <ul>
                            <li>Unlimited listening</li>
                            <li>Create playlists</li>
                            <li>Upload your music</li>
                            <li>Support artists directly</li>
                        </ul>
                        <button type="button" class="account-type-select">Choose _user</button>
                    </div>
                    <div class="account-type-card" data-type="group">
                        <div class="account-type-icon">_group</div>
                        <h3>Group</h3>
                        <p class="account-type-price">15€ <span>/ month</span></p>
                        <p class="account-type-mini">5 users included</p>
                        <ul>
                            <li>All individual features</li>
                            <li>Up to 5 accounts</li>
                            <li>Shared billing</li>
                            <li>Everyone can upload</li>
                        </ul>
                        <button type="button" class="account-type-select">Choose _group</button>
                    </div>
                </div>
                <div class="login-link">
                    Already have an account? <a href="#/login">Log in</a>
                </div>
            </div>
        </main>
    </template>

    <template id="tpl-register">
        <main class="auth-main">
            <div class="register-container">
                <div class="register-header">
                    <h1 class="register-title">Create Account</h1>
                    <button class="register-close-btn" onclick="window.location.hash='#/welcome'" aria-label="Close register">
                        <i class="fas fa-times"></i>
                    </button>
                </div>

                <div class="selected-account-type">
                    <span id="selectedTypeLabel">Individual</span>
                    <span id="selectedTypePrice">5€ / month</span>
                    <a href="#/welcome">Change</a>
                </div>

                <form id="registerForm">
                    <input type="hidden" id="accountType" name="accountType" value="user">
                    <div class="form-group" id="groupSizeField" style="display:none;">
                        <label for="groupSize">Group size</label>
                        <select id="groupSize" name="groupSize">
                            <option value="5" selected>5 users (15€)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="registerUsername">Username</label>
                        <input type="text" id="registerUsername" name="username" required minlength="3">
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="firstName">First Name</label>
                            <input type="text" id="firstName" name="firstName" required>
                        </div>
                        <div class="form-group">
                            <label for="lastName">Last Name</label>
                            <input type="text" id="lastName" name="lastName" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="registerPassword">Password</label>
                        <input type="password" id="registerPassword" name="password" required minlength="8">
                        <div class="password-requirements">At least 8 characters</div>
                    </div>
                    <div class="form-group">
                        <label for="confirm-password">Confirm Password</label>
                        <input type="password" id="confirm-password" name="confirm-password" required>
                    </div>

                    <div class="form-group payment-methods">
                        <label>Payment method</label>
                        <div class="payment-methods-grid">
                            <label class="payment-method-option">
                                <input type="radio" name="paymentMethod" value="card" checked>
                                <span><i class="fas fa-credit-card"></i> Card</span>
                            </label>
                            <label class="payment-method-option">
                                <input type="radio" name="paymentMethod" value="paypal">
                                <span><i class="fab fa-paypal"></i> PayPal</span>
                            </label>
                        </div>
                    </div>

                    <div class="form-group terms-checkbox">
                        <label>
                            <input type="checkbox" id="terms" required>
                            I agree to the <a href="#/impressum" class="link-turquoise">Terms of Service</a> and authorize the payment.
                        </label>
                    </div>

                    <button type="submit" class="register-btn">Continue to payment</button>
                </form>

                <div class="login-link">
                    Already have an account? <a href="#/login">Log in</a>
                </div>
            </div>
        </main>
    </template>

    <template id="tpl-verify-pending">
        <main class="auth-main">
            <div class="register-container">
                <div class="register-header">
                    <h1 class="register-title">Complete registration</h1>
                    <button class="register-close-btn" onclick="window.location.hash='#/feed'" aria-label="Close">
                        <i class="fas fa-times"></i>
                    </button>
                </div>

                <div class="pending-steps">
                    <div class="pending-step" id="step-email">
                        <div class="step-number">1</div>
                        <div class="step-content">
                            <h3>Verify your email</h3>
                            <p>We sent a verification link to <strong id="pendingEmail"></strong>.</p>
                            <form id="verifyCodeForm">
                                <div class="form-group">
                                    <label for="verificationCode">Or enter verification code</label>
                                    <input type="text" id="verificationCode" name="verificationCode" placeholder="Enter code" required>
                                </div>
                                <button type="submit" class="verify-btn">Verify email</button>
                            </form>
                            <button type="button" id="resendVerificationBtn" class="text-link">Resend email</button>
                        </div>
                    </div>

                    <div class="pending-step" id="step-payment">
                        <div class="step-number">2</div>
                        <div class="step-content">
                            <h3>Complete payment</h3>
                            <p id="paymentDescription">Secure payment via Stripe.</p>
                            <button type="button" id="payNowBtn" class="register-btn">Pay now</button>
                            <button type="button" id="checkPaymentBtn" class="text-link">I already paid</button>
                        </div>
                    </div>

                    <div class="pending-step" id="step-done" style="display:none;">
                        <div class="step-number">3</div>
                        <div class="step-content">
                            <h3>All done!</h3>
                            <p>Your account is active.</p>
                            <button type="button" id="continueToFeedBtn" class="register-btn">Continue to juqeboks</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </template>

        <template id="tpl-profile">
        <main class="auth-main">
            <div class="profile-container profile-public">
                <div class="profile-header">
                    <h1 class="profile-title">_U</h1>
                    <button class="profile-close-btn" onclick="window.location.hash='#/feed'" aria-label="Close profile">
                        <i class="fas fa-times"></i>
                    </button>
                </div>

                <div class="profile-public-header">
                    <div class="profile-public-avatar">
                        <img id="publicAvatarImg" src="images/juqe.png" alt="Avatar">
                    </div>
                    <div class="profile-public-meta">
                        <div class="profile-public-username">
                            <span class="username-display"></span>
                        </div>
                        <div class="profile-public-stats">
                            <div class="profile-stat"><span id="publicPostsCount">0</span> posts</div>
                            <div class="profile-stat"><span id="publicRepostsCount">0</span> reposts</div>
                        </div>
                    </div>
                </div>

                <div class="profile-public-bio">
                    <p id="publicBioText">No bio yet.</p>
                </div>

                <div class="profile-public-actions">
                    <button class="profile-btn secondary" onclick="window.location.hash='#/pref'">Edit Profile</button>
                    <button class="profile-btn secondary" onclick="window.location.hash='#/upload'">New Post</button>
                </div>

                <div class="profile-tabs">
                    <button class="profile-tab active" data-tab="posts">Posts</button>
                    <button class="profile-tab" data-tab="reposts">Reposts</button>
                </div>

                <div class="profile-tab-content active" id="tab-posts">
                    <div class="profile-posts-grid" id="postsGrid">
                        <p class="profile-empty">No posts yet. Upload your first track.</p>
                    </div>
                </div>

                <div class="profile-tab-content" id="tab-reposts">
                    <div class="profile-posts-grid" id="repostsGrid">
                        <p class="profile-empty">No reposts yet.</p>
                    </div>
                </div>
            </div>
        </main>
    </template>

    <template id="tpl-pref">
        <main class="auth-main">
            <div class="profile-container">
                <div class="profile-header">
                    <h1 class="profile-title">_pref</h1>
                    <button class="profile-close-btn" onclick="window.location.hash='#/feed'" aria-label="Close preferences">
                        <i class="fas fa-times"></i>
                    </button>
                </div>

                <div class="profile-card">
                    <div class="profile-avatar-section">
                        <div class="avatar-preview" id="prefAvatarPreview">
                            <img id="prefAvatarPreviewImg" src="images/juqe.png" alt="Avatar">
                        </div>
                        <input type="file" id="prefAvatarFile" accept="image/*" style="display:none;">
                        <button type="button" id="prefAvatarUploadBtn" class="profile-btn secondary">Upload Picture</button>
                        <button type="button" id="prefAvatarRemoveBtn" class="profile-btn secondary" style="display:none;">Remove</button>
                        <input type="hidden" id="prefAvatar">
                    </div>
                    <div class="profile-info-section">
                        <div class="profile-subtitle">Signed in as <span class="username-display"></span></div>
                        <div id="prefMessage" class="profile-message"></div>
                        <form id="prefForm">
                            <div class="form-group">
                                <label for="prefUsername">Username</label>
                                <input type="text" id="prefUsername" name="prefUsername" required>
                            </div>
                            <div class="form-group">
                                <label for="prefEmail">Email</label>
                                <input type="email" id="prefEmail" name="prefEmail" disabled>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="prefFirstName">First Name</label>
                                    <input type="text" id="prefFirstName" name="prefFirstName">
                                </div>
                                <div class="form-group">
                                    <label for="prefLastName">Last Name</label>
                                    <input type="text" id="prefLastName" name="prefLastName">
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="prefBio">Bio</label>
                                <textarea id="prefBio" name="prefBio" rows="3" placeholder="Tell us something about you..."></textarea>
                            </div>
                            <div class="form-group">
                                <label>Password Change</label>
                                <input type="password" id="prefCurrentPassword" placeholder="Current password">
                                <input type="password" id="prefNewPassword" placeholder="New password" style="margin-top:8px;">
                                <input type="password" id="prefConfirmPassword" placeholder="Confirm new password" style="margin-top:8px;">
                            </div>
                            <button type="submit" class="profile-btn primary">Save Settings</button>
                        </form>
                    </div>
                </div>

                <div class="pref-section">
                    <h2 class="pref-section-title">Payment</h2>
                    <div id="prefPaymentStatus" class="pref-payment-status">
                        <span class="pref-status-badge">Loading...</span>
                    </div>
                    <button id="prefPayBtn" class="profile-btn primary" style="margin-top:12px;">Complete Payment</button>
                </div>

                <div class="profile-actions">
                    <button type="button" id="prefLogoutBtn" class="profile-btn">Logout</button>
                    <button type="button" id="prefDeleteProfileBtn" class="profile-btn danger">Delete Profile</button>
                </div>
            </div>
        </main>
    </template>

    <template id="tpl-queue">
        <main class="queue-main">
            <div class="queue-container">
                <div class="queue-header">
                    <h1 class="queue-title">Queue</h1>
                    <button class="queue-close-btn" onclick="window.location.hash='#/feed'" aria-label="Close queue">
                        <i class="fas fa-times"></i>
                    </button>
                </div>

                <div class="queue-content">
                    <div class="queue-section">
                        <h2 class="queue-section-title">Previously Played</h2>
                        <div class="queue-list" id="previousSongs"></div>
                    </div>

                    <div class="queue-section current-section">
                        <h2 class="queue-section-title">Now Playing</h2>
                        <div class="current-track" id="currentTrack"></div>
                    </div>

                    <div class="queue-section">
                        <h2 class="queue-section-title">Up Next</h2>
                        <div class="queue-list" id="nextSongs"></div>
                    </div>
                </div>
            </div>
        </main>
    </template>
    <main id="app"></main>

    <a href="#/login" class="floating-button">
        <img src="images/U-pink.png" alt="Juke Logo">
    </a>

    <div class="mobile-header">
        <a href="#/feed">
            <img src="images/juqe.png" alt="JUKE" class="mobile-logo">
        </a>
        <input type="text" class="mobile-search" placeholder="Search...">
        <button class="mobile-user-btn auth-login" onclick="window.location.hash='#/login'">_U</button>
        <button class="mobile-user-btn auth-user" style="display:none;" onclick="window.location.hash='#/profile'">_U</button>
    </div>

    <div class="mobile-mini-player" id="mobileMiniPlayer">
        <div class="mini-progress" id="miniProgress"></div>
        <div class="mini-content">
            <img src="images/juqe.png" alt="Cover" class="mini-cover" id="miniCover">
            <div class="mini-info">
                <p class="mini-title" id="miniTitle">Not Playing</p>
                <p class="mini-artist" id="miniArtist">-</p>
            </div>
            <div class="mini-controls">
                <button class="mini-btn mini-like" id="miniLike" aria-label="Like">
                    <i class="far fa-heart"></i>
                </button>
                <button class="mini-btn mini-play-btn" id="miniPlay" aria-label="Play">
                    <i class="fas fa-play"></i>
                </button>
            </div>
        </div>
    </div>

                            <nav class="mobile-nav">
            <div class="mobile-nav-items">
                <a href="#/feed" class="mobile-nav-item" data-nav="feed" aria-label="Feed">
                    <i class="fas fa-home"></i>
                    <span>_feed</span>
                </a>
                <a href="#/lists" class="mobile-nav-item" data-nav="lists" aria-label="Lists">
                    <i class="fas fa-list"></i>
                    <span>_lists</span>
                </a>
                <a href="#/profile" class="mobile-nav-item mobile-nav-center" data-nav="profile" aria-label="Profile">
                    <img src="images/U-pink.png" alt="U" class="mobile-nav-logo">
                    <span>_U</span>
                </a>
                <a href="#/disqo" class="mobile-nav-item" data-nav="disqo" aria-label="Find">
                    <i class="fas fa-search"></i>
                    <span>_find</span>
                </a>
                <a href="#/pref" class="mobile-nav-item" data-nav="pref" aria-label="Preferences">
                    <i class="fas fa-cog"></i>
                    <span>_pref</span>
                </a>
            </div>
        </nav>

    <div class="fullscreen-player" id="fullscreenPlayer">
        <div class="fs-header">
            <button class="fs-close" id="fsClose"><i class="fas fa-chevron-down"></i></button>
            <div class="fs-title-small">Now Playing</div>
            <button class="fs-more"><i class="fas fa-ellipsis-h"></i></button>
        </div>
        <div class="fs-artwork">
            <img src="images/juqe.png" alt="Album Art" class="fs-cover" id="fsCover">
        </div>
        <div class="fs-info">
            <h2 class="fs-track-title" id="fsTitle">Not Playing</h2>
            <p class="fs-track-artist" id="fsArtist">-</p>
        </div>
        <div class="fs-progress">
            <div class="fs-progress-bar" id="fsProgressBar">
                <div class="fs-progress-fill" id="fsProgressFill"></div>
            </div>
            <div class="fs-times">
                <span id="fsCurrentTime">0:00</span>
                <span id="fsDuration">0:00</span>
            </div>
        </div>
        <div class="fs-controls">
            <button class="fs-ctrl-btn" id="fsShuffle"><i class="fas fa-random"></i></button>
            <button class="fs-ctrl-btn fs-prev-btn" id="fsPrev"><i class="fas fa-step-backward"></i></button>
            <button class="fs-ctrl-btn fs-play-btn" id="fsPlay"><i class="fas fa-play"></i></button>
            <button class="fs-ctrl-btn fs-next-btn" id="fsNext"><i class="fas fa-step-forward"></i></button>
            <button class="fs-ctrl-btn" id="fsRepeat"><i class="fas fa-redo"></i></button>
        </div>
        <div class="fs-bottom">
            <button class="fs-bottom-btn" id="fsDevice"><i class="fas fa-mobile-alt"></i></button>
            <button class="fs-bottom-btn" id="fsShare"><i class="fas fa-share"></i></button>
            <button class="fs-bottom-btn" id="fsQueue"><i class="fas fa-bars"></i></button>
        </div>
    </div>

    <div class="music-player"></div>

    <div id="showtimeModal" class="showtime-modal" style="display: none;">
        <div class="showtime-modal-content">
            <div class="showtime-modal-header">
                <h3>Choose Showtime Option</h3>
                <button type="button" id="showtimeCloseBtn" class="showtime-close-btn">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>
    </div>
</body>
</html>
