<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment successful</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            color: #fff;
            font-family: sans-serif;
            text-align: center;
        }
        .box { max-width: 360px; padding: 24px; }
        .icon { font-size: 48px; margin-bottom: 16px; }
        .spinner { font-size: 24px; margin-top: 16px; animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="box">
        <div class="icon">💳</div>
        <h1>Payment received</h1>
        <p>We are confirming your payment and opening juqeboks…</p>
        <div class="spinner">⏳</div>
    </div>
    <script>
        (function () {
            var params = new URLSearchParams(window.location.search);
            var sessionId = params.get('session_id');
            var redirectUrl = 'index.html' + (sessionId ? '?session_id=' + encodeURIComponent(sessionId) : '') + '#/verify-pending';
            window.location.replace(redirectUrl);
        })();
    </script>
</body>
</html>
